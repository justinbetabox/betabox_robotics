<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <title>
        {% block title %}
            Betabox Launchpad
        {% endblock %}
    </title>

    <script>
    (() => {
        const root = document.documentElement;

        const readStoredValue = (key) => {
            try {
                return window.localStorage.getItem(key);
            } catch {
                return null;
            }
        };

        const theme = readStoredValue(
            "betabox-launchpad-theme"
        );

        if (
            theme === "light"
            || theme === "dark"
        ) {
            root.dataset.theme = theme;
        }

        root.dataset.reducedMotion =
            readStoredValue(
                "betabox-launchpad-reduced-motion"
            ) === "true"
                ? "true"
                : "false";

        root.dataset.largerText =
            readStoredValue(
                "betabox-launchpad-larger-text"
            ) === "true"
                ? "true"
                : "false";

        root.dataset.compactLayout =
            readStoredValue(
                "betabox-launchpad-compact-layout"
            ) === "true"
                ? "true"
                : "false";
    })();
    </script>

    <link
        rel="stylesheet"
        href="/static/css/tokens.css"
    >

    <link
        rel="stylesheet"
        href="/static/css/components.css"
    >

    {% block page_styles %}
    {% endblock %}
</head>

<body class="{% block body_class %}{% endblock %}">
    {% block body %}
    {% endblock %}

    <script src="/static/js/theme.js"></script>

    {% block shared_scripts %}
    {% endblock %}

    {% block page_scripts %}
    {% endblock %}
</body>
</html>
